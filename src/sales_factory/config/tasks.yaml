lead_research_task:
  description: >
    Target country: {target_country}
    Proposal language: {proposal_language}
    User query: {lead_query}
    Lead mode: {lead_mode}
    Active segment: {segment_label}
    Segment brief: {segment_brief}

    If lead_mode is "company_name", treat lead_query as one exact company and
    search for exact legal-name matches first. If multiple companies share that
    exact name, return the distinct candidates you found instead of silently
    guessing which one is correct.
    Return an exact-name candidate only if you can gather enough reliable public evidence.
    Do not substitute a similar company, different brand, or partial match.
    If the exact company cannot be verified, return zero rows.
    If lead_mode is "region_or_industry", find up to {max_companies} companies
    that match the requested market.
    If segment_label is provided, only keep companies that clearly match the
    active segment's buyer, offer fit, and business model. A company matching
    the geography but not the segment should be deprioritized or excluded.

    For each company, collect:
    company_name, industry, location, contact_email_or_phone, homepage_url_if_any,
    public_profile_links, source_links, company_size_estimate, revenue_estimate,
    sub_industry, decision_maker_hint, icp_fit, icp_notes, current_digital_presence.

    Public_profile_links should include any useful external evidence such as
    Google Business, social pages, directory listings, marketplace pages, or
    association profiles. Prefer companies where the public footprint reveals a
    real digital gap that Onecation can solve.
  expected_output: >
    First line must be exactly: TOTAL_COMPANIES: N
    where N is the exact number of rows in the table below.

    Then output one markdown table with exactly N rows and these columns:
    company_name | industry | location | contact_email_or_phone | homepage_url_if_any |
    public_profile_links | source_links | company_size_estimate | revenue_estimate |
    sub_industry | decision_maker_hint | icp_fit | icp_notes | current_digital_presence

    Rules:
    - Do not invent contact details.
    - Keep source_links and public_profile_links useful and concrete.
    - icp_notes must briefly explain why the company is or is not worth pursuing.
    - Never swap in a different company when lead_mode is "company_name".
    - If multiple exact-name companies exist, include each distinct candidate row
      you can verify, up to 3 rows, so downstream disambiguation can choose safely.
  agent: lead_finder

identity_disambiguation_task:
  description: >
    Review lead_research_task and resolve exact-company identity before any
    verification or proposal work continues.

    Rules:
    - If lead_mode is "company_name", compare same-name candidates using
      homepage domain, official address, city/state/country, phone number,
      email domain, and public profile consistency.
    - Never guess between same-name companies.
    - If one candidate is clearly supported by coherent evidence, keep only
      that row and mark it selected.
    - If multiple candidates remain plausible, or the evidence is internally
      inconsistent, return zero retained rows.
    - If lead_mode is "region_or_industry", pass through each coherent company
      as selected; reject only rows with obvious identity conflicts.
    - Prefer a false negative over a false positive.
  expected_output: >
    First line must be exactly: TOTAL_COMPANIES: N
    where N is the number of rows retained after disambiguation.

    Then output one markdown table with exactly N rows and these columns:
    company_name | industry | location | contact_email_or_phone | homepage_url_if_any |
    public_profile_links | source_links | company_size_estimate | revenue_estimate |
    sub_industry | decision_maker_hint | icp_fit | icp_notes | current_digital_presence |
    official_address | official_phone | official_email_domain | identity_confidence |
    identity_match_basis | conflict_notes | disambiguation_status

    disambiguation_status must be one of:
    selected | ambiguous | rejected

    Retained rows must only use selected.
    identity_confidence must be one of:
    high | medium | low
  agent: identity_disambiguator
  context:
    - lead_research_task

lead_verification_task:
  description: >
    Verify every row from identity_disambiguation_task before any audit or proposal work
    happens. Your job is to confirm that the company identity, official website,
    and public evidence actually belong together.

    Rules:
    - Treat identity_disambiguation_task as a draft, not as ground truth.
    - Correct wrong homepage URLs, wrong legal names, and mismatched public links.
    - If lead_mode is "company_name", only keep the exact intended company.
    - Do not mark a company rejected only because its website is down, inaccessible,
      or has DNS/TLS issues when the company identity is otherwise supported by
      reliable public evidence.
    - If a row cannot be tied to reliable public evidence, mark it rejected.
    - If a company appears to have no official website, leave homepage_url_if_any blank
      and explain why in verification_notes.
    - Never invent a website just to fill the field.
  expected_output: >
    First line must be exactly: TOTAL_COMPANIES: N
    where N is the exact number of rows retained after verification.

    Then output one markdown table with exactly N rows and these columns:
    company_name | industry | location | contact_email_or_phone | homepage_url_if_any |
    public_profile_links | source_links | company_size_estimate | revenue_estimate |
    sub_industry | decision_maker_hint | icp_fit | icp_notes | current_digital_presence |
    verification_status | verification_notes

    verification_status must be one of:
    verified | corrected | rejected

    Retained rows must only use verified or corrected.
    If a row is rejected, do not include it in the retained table.
  agent: lead_verifier
  context:
    - identity_disambiguation_task

website_audit_task:
  description: >
    Audit every verified company from lead_verification_task. Use the corrected
    homepage_url_if_any, verified location, and verification_notes there as the
    authoritative inputs. Never infer a different city, state, or metro area
    than the one already verified upstream.
    When a homepage URL exists, scrape the website and compare what is on the official site with public
    information from directories, listings, and public profiles.

    Classify each company into one of these buckets:
    - no_website: no credible official website was found
    - outdated_website: a website exists, but it looks stale, weak, broken, or
      clearly behind current trust and conversion standards
    - inconsistent_website: a website exists, but important public information
      appears out of date, incomplete, or inconsistent with external sources
    - healthy_website: the website appears current enough and not obviously in
      need of urgent intervention

    For every company, score:
    - website_urgency_score (0-35)
    - market_fit_score (0-25)
    - reachability_score (0-20)
    - execution_readiness_score (0-20)

    priority_score is the total from 0 to 100.
    Then assign action_bucket:
    - hot: 70-100
    - warm: 50-69
    - cold: 0-49

    Prioritize companies in no_website, outdated_website, or inconsistent_website
    when the evidence suggests a credible sales opportunity.
    If a plausible official URL exists but the site is unreachable from the current
    audit environment due to timeout, DNS, TLS, or connection errors, do not call
    it no_website. Use inconsistent_website and explain that access could not be
    verified from the current audit environment.
  expected_output: >
    First line must be exactly: TOTAL_COMPANIES: N
    where N matches the number of companies audited.

    Then output one markdown table with exactly N rows and these columns:
    company_name | location | homepage_url_if_any | website_bucket | key_evidence | mismatch_summary |
    website_urgency_score | market_fit_score | reachability_score |
    execution_readiness_score | priority_score | action_bucket | recommended_offer_type

    recommended_offer_type must be one of:
    relaunch_offer | maintenance_recovery_offer | new_presence_offer | monitor_only

    key_evidence and mismatch_summary must be concrete, short, and evidence-based.
  agent: website_auditor
  context:
    - lead_verification_task

competitor_analysis_task:
  description: >
    For each prioritized company from website_audit_task, research the local
    market in the target country and identify 3-5 relevant competitors or
    alternative providers. Focus on what helps a senior sales proposal:
    visible positioning, trust signals, website quality, offers, market gaps,
    buying patterns, and what this company should emphasize or avoid.

    You must be country-aware. Do not force Korean channels or assumptions onto
    every market. Explain what matters in the target country, including where
    trust seems to come from and which digital or commercial motions appear to
    matter most.
    Treat the verified location from website_audit_task as authoritative.
    Never introduce a different city, state, metro area, or competitor set
    from another region. If local geography is uncertain, say "the local market"
    instead of naming a region you cannot verify.

    For each company, derive:
    - market_snapshot
    - competitor table
    - strengths_to_amplify
    - proposal_angles
    - caution_points
  expected_output: >
    For each prioritized company, create one H1 section:
    # Company Name

    The H1 must use the exact company_name string from website_audit_task.
    Do not shorten it. Do not translate it. Do not add or remove parenthetical text.

    Inside each section, use this exact structure:
    ## Market Snapshot
    - country_context: ...
    - buyer_behavior: ...
    - visible_opportunity: ...
    - why_now: ...

    ## Competitor Table
    A markdown table with human-readable column headers written in the same language as this proposal.
    Columns to include (translate headers to match the proposal language):
    Competitor Name | Website Quality | Key Offering | Trust Signals | Customer Acquisition | Strengths | Weaknesses

    ## Strengths To Amplify
    2-4 bullets about the target company's hidden strengths or angles worth
    emphasizing online.

    ## Proposal Angles
    2-4 bullets explaining what the sales proposal should push hard.

    ## Caution Points
    2-4 bullets explaining what to avoid, over-claim, or frame carefully in
    this market.
  agent: competitor_analyst
  context:
    - website_audit_task

landing_page_task:
  description: >
    Build a web narrative blueprint for each prioritized company. This is not a
    full website build. It is the message architecture that Onecation would use
    if the prospect accepts the project.

    Tie the narrative to the website bucket and recommended offer type. The
    message should reflect the company's actual strengths, market opportunity,
    and trust gap. Use the target country context when proposing proof blocks,
    CTAs, and page structure.
  expected_output: >
    For each prioritized company, create one H1 section:
    # Company Name

    The H1 must use the exact company_name string from website_audit_task.
    Do not shorten it. Do not translate it. Do not add or remove parenthetical text.

    Inside each section, use this structure:
    ## Core Promise
    - primary_headline: ...
    - supporting_promise: ...
    - primary_cta: ...

    ## Trust Blocks
    - trust_block_1: ...
    - trust_block_2: ...
    - proof_to_collect: ...

    ## Page Priorities
    A markdown table with these columns:
    page_or_block | purpose | key_message | conversion_role

    ## Conversion Notes
    2-4 bullets on what must happen for the site to convert better.
  agent: landing_page_builder
  context:
    - website_audit_task
    - competitor_analysis_task

marketing_recommendation_task:
  description: >
    Recommend the highest-leverage commercial actions for each prioritized
    company. Do not default to weekly social posting. You may recommend digital
    or non-digital motions, including:
    website relaunch, website maintenance, SEO, Google Ads, Meta ads, LinkedIn,
    cold email, local directories, partnership outreach, trade associations,
    offline sales activity, content, or other country-appropriate channels.

    Your output must answer:
    - What should happen first?
    - What should support it?
    - What should be avoided for now?
    - What could become a monthly retainer?

    Tie the answer to the target country, the website bucket, and the realistic
    buying behavior of that market.
    Treat the verified location from website_audit_task as authoritative.
    Never introduce a different city, state, or metro area than the one already
    verified upstream.
    Never leave placeholders such as [city], [country], [company], or [contact name].
    If a specific detail is unknown, rewrite the sentence without a placeholder.
  expected_output: >
    For each prioritized company, create one H1 section:
    # Company Name

    The H1 must use the exact company_name string from website_audit_task.
    Do not shorten it. Do not translate it. Do not add or remove parenthetical text.

    Inside each section, use this structure:
    ## Recommended Offer
    A markdown table with these columns:
    offer_type | what_is_included | why_this_offer | setup_budget_range | monthly_budget_range

    ## Go-To-Market Priorities
    A markdown table with these columns:
    priority | motion | why_this_company | first_30_days | target_kpi

    ## Retainer Opportunities
    2-4 bullets describing what ongoing work Onecation could manage after the
    initial project, if relevant.

    ## What Not To Do First
    2-4 bullets describing low-priority or premature actions.
  agent: marketing_strategist
  context:
    - website_audit_task
    - competitor_analysis_task
    - landing_page_task

proposal_task:
  description: >
    Write the canonical proposal draft in English for each prioritized company.
    This is the source-of-truth draft that will later be localized into
    {proposal_language}. It must be strong enough that a senior sales localizer
    can translate it without changing the business logic.

    Use {currency} for pricing guidance.
    Quality rework attempt: {quality_rework_attempt}
    Quality rework feedback: {quality_rework_feedback}
    The proposal must be polite, specific, and commercially sharp. Include a
    short greeting near the front and a short thank-you closing at the end.
    Always use plain ASCII punctuation instead of smart quotes or typographic
    apostrophes.
    Treat the verified location from upstream research as authoritative.
    Never introduce a different city, state, metro area, or local competitor
    set from another region. If local geography is uncertain, write "your local
    market" instead of guessing.

    This is not a generic marketing report. It must:
    - identify the company's current digital state
    - explain why that state matters commercially
    - show relevant market and competitor context
    - surface hidden strengths this company should amplify
    - recommend a clear project direction
    - recommend a practical execution plan
    - present a tailored package and price guidance

    Always adapt to the website bucket:
    - outdated_website -> relaunch logic
    - inconsistent_website -> maintenance recovery logic
    - no_website -> new presence logic

    Your execution plan may include website work, maintenance, cold email,
    partnerships, search, paid media, local directories, offline activity,
    content, or a combination. Do not force the same channels on every company.

    If reliable data is missing, say so clearly instead of inventing certainty.
    If website access could not be verified from the current audit environment,
    say that explicitly instead of claiming the company has no website as a fact.
    Never cite raw audit-environment error strings such as DNS, TLS, name
    resolution, getaddrinfo, timeout, connection refused, or browser error-page
    wording in customer-facing copy. Rewrite those situations in business
    language such as "we could not fully verify the current site from our audit
    environment" or "the current web presence could not be reviewed reliably."
    Never leave placeholders such as [your name], [company], [city], or [contact name].
    Approved Onecation proof points:
    {onecation_proof_points}

    Rules for ## Why Onecation:
    - Use only approved proof points that appear above.
    - If no approved named case studies or metrics are provided, do not invent them.
    - Never fabricate client names, logos, conversion lifts, revenue lifts, years, or awards.
    - If quality_rework_feedback is provided, treat it as mandatory internal QA notes
      and explicitly fix every listed issue before finalizing the draft.
  expected_output: >
    For each prioritized company, create one H1 section:
    # Company Name

    The H1 must use the exact company_name string from website_audit_task.
    Do not shorten it. Do not translate it. Do not add or remove parenthetical text.

    Inside each section, use this exact structure:
    ## Greeting
    A short, polite opening that says this proposal was prepared after reviewing
    the company's current digital presence and market context.

    ## Executive Summary
    1 short paragraph plus 3-5 bullets covering:
    current situation, biggest risk, biggest opportunity, and recommended start.

    ## What We Found
    3-5 bullets describing the current website/digital condition with evidence.

    ## Why This Matters
    1-2 short paragraphs explaining the commercial impact if nothing changes.

    ## Market And Competitor Snapshot
    Include:
    - a short market summary
    - a markdown competitor table copied or adapted from upstream research
    - 2-4 bullets on what competitors appear to be doing better or differently

    ## Your Hidden Strengths
    2-4 bullets on what this company can uniquely amplify.

    ## Recommended Direction
    1 short paragraph naming the recommended offer direction and why it fits.

    ## 30-60-90 Day Execution Plan
    A markdown table with human-readable column headers written in the same language as this proposal.
    Columns to include (translate headers to match the proposal language):
    Phase | What We Do | Expected Business Effect

    ## Recommended Packages
    A markdown table with human-readable column headers written in the same language as this proposal.
    Columns to include (translate headers to match the proposal language):
    Package Name | Best For | What's Included | Price Range | Notes

    Include:
    - one recommended package
    - one alternative package
    - one optional ongoing retainer

    ## Pricing Guidance
    1 short paragraph explaining the pricing logic in plain business language.

    ## Why Onecation
    1 short paragraph plus 3-5 bullets on cross-border fit, execution strength,
    and relevant proof.
    Use only approved proof points supplied in {onecation_proof_points}. If no
    approved case studies are supplied, keep this section factual and general
    instead of inventing client results or metrics.

    ## Suggested Next Step
    A concise numbered list with at most 3 steps.

    ## Closing
    A short, polite thank-you note that invites a reply.
  agent: proposal_writer
  context:
    - website_audit_task
    - competitor_analysis_task
    - landing_page_task
    - marketing_recommendation_task

proposal_localization_task:
  description: >
    Localize proposal_task into {proposal_language} for each prioritized
    company. You are producing the final customer-facing proposal content that
    will be rendered into Word and PDF.

    Rules:
    - Quality rework attempt: {quality_rework_attempt}
    - Quality rework feedback: {quality_rework_feedback}
    - Preserve the exact H1 company name from proposal_task.
    - Preserve every `##` section heading from proposal_task exactly in English.
      These headings are pipeline control markers and must not change.
    - Translate all customer-facing prose, bullet text, numbered steps, and
      table cell content into {proposal_language}.
      - Keep numbers, package structure, commercial intent, and facts aligned with
        the canonical draft.
      - Keep geography aligned with the verified upstream location. Do not swap
        in another city, state, metro area, or competitor region.
      - Do not add or remove sections.
    - Do not leave placeholders such as [your name], [company], [city], or
      [contact name].
    - If website access was uncertain, describe it as an audit verification
      issue instead of claiming the company has no website as a hard fact.
    - Do not mention DNS, TLS, getaddrinfo, timeout, connection refused, or
      raw browser/network errors in customer-facing copy. Rewrite them into
      neutral business language about incomplete audit verification.
    - Keep Onecation and the exact company name unchanged.
    - When the target language is English, lightly polish proposal_task but keep
      the same structure and business meaning.
    - If quality_rework_feedback is provided, treat it as mandatory internal QA notes
      and explicitly fix every listed issue before finalizing the localized proposal.
  expected_output: >
    Reproduce the exact company-by-company markdown structure from proposal_task:
    - the same `# Company Name` sections
    - the same `##` section headings in the same order
    - the same overall table and list structure

    Only localize customer-facing content under those headings.
  agent: proposal_localizer
  context:
    - proposal_task

email_outreach_task:
  description: >
    Write the canonical outbound email sequence in English for each prioritized
    company. This is the source draft that will later be localized into
    {proposal_language}. Assume the full proposal document and PDF are attached
    in the first touch. The first email should feel researched and substantial,
    not teaser-only.

    Every company's sequence must include:
    - one primary outbound email (day 1) that references the attached proposal
    - one follow-up email (day 5-7)
    - one final follow-up email (day 10-14)

    Requirements:
    - Quality rework attempt: {quality_rework_attempt}
    - Quality rework feedback: {quality_rework_feedback}
    - Mention one company-specific observation.
    - Mention one market or competitor insight.
    - State one concrete way Onecation would help.
    - Keep the subject core concise and specific so Korean localization can turn it into
      `[주식회사 98점7도] ...의 건` without awkward wording.
    - In the primary email body, state the exact commercial offer in one plain sentence.
      Name whether this is a website relaunch, website maintenance recovery,
      new website build, or website-plus-marketing execution support.
    - Use one clear CTA only.
    - Keep the tone respectful and professional.
      - Avoid generic praise and template filler.
      - Keep all local references aligned with the verified upstream location.
        Never swap in a different city, state, metro area, or competitor region.
      - Never leave bracket placeholders such as [your name], [contact name], or [city].
      - Always use plain ASCII punctuation instead of smart quotes or typographic
        apostrophes.
      - For Korean localization, the opening sentence must be the exact fixed line
        `안녕하세요, 주식회사 98점7도 염정원입니다.`
      - For Korean localization, rewrite every subject into the exact format
        `[주식회사 98점7도] ...의 건`.
      - For non-Korean markets, identify the sender as the 98.7 Co., Ltd. team naturally.
      - Lead with the company's own strengths, position, or current situation before
        naming competitors.
      - Use competitor references only as brief supporting context, not as the first
        or dominant message.
      - State the core offer once clearly, then explain the concrete business effect.
        Do not repeat the same offer pitch twice.
      - End with one thank-you/closing only. Avoid duplicated gratitude lines.

    The first email should make it clear that real work was already done:
    review, diagnosis, competitor context, and tailored execution ideas.
    The primary email body must also include:
    - a short opening sentence that can localize cleanly into the fixed Korean greeting
      `안녕하세요, 주식회사 98점7도 염정원입니다.`
    - a short, explicit offer sentence that says what we want to sell
    - a short, polite closing sentence before the CTA field
    If website access was uncertain, describe it as an audit verification issue,
    not as a hard factual claim that the company has no website.
    Use softened language such as "in our review environment" or "your online
    strengths are not yet clearly visible" instead of declaring that the site is
    unavailable unless that fact is fully verified.
    Never cite raw audit-environment error strings such as DNS, TLS, name
    resolution, getaddrinfo, timeout, connection refused, or browser error-page
    wording in customer-facing copy. Rewrite them into neutral language about
    incomplete verification of the current web presence.
    - If quality_rework_feedback is provided, treat it as mandatory internal QA notes
      and explicitly fix every listed issue before finalizing the outbound sequence.
  expected_output: >
    For each prioritized company, create one H1 section:
    # Company Name

    The H1 must use the exact company_name string from website_audit_task.
    Do not shorten it. Do not translate it. Do not add or remove parenthetical text.

    Inside each section, use this exact structure:
    ## Primary Outbound Email
    - subject: ...
    - preview_line: ...
    - body:
      A ready-to-send email body. It must contain:
      1. a short Onecation introduction near the top
      2. one short paragraph that starts from the company's own strengths or current situation
      3. one explicit sentence naming the proposed offer
      4. one short paragraph explaining the expected business effect
      5. one polite closing sentence before the CTA
    - cta: ...

    ## Follow Up 1
    - subject: ...
    - body:
      A ready-to-send follow-up email body.
    - cta: ...

    ## Follow Up 2
    - subject: ...
    - body:
      A ready-to-send final follow-up email body.
    - cta: ...

    Also include:
    ## Personalization Notes
    2-4 bullets on which facts were used to tailor the sequence.
  agent: email_writer
  context:
    - proposal_task
    - competitor_analysis_task
    - marketing_recommendation_task

email_localization_task:
  description: >
    Localize email_outreach_task into {proposal_language}. This is the final
    send-ready sequence that internal tools will parse.

    Rules:
    - Quality rework attempt: {quality_rework_attempt}
    - Quality rework feedback: {quality_rework_feedback}
    - Preserve the exact H1 company name from email_outreach_task.
    - Preserve the exact `##` section headings:
      `## Primary Outbound Email`, `## Follow Up 1`, `## Follow Up 2`,
      and `## Personalization Notes`.
    - Preserve the exact field keys `subject`, `preview_line`, `body`, and `cta`
      in English.
      - Translate only the customer-facing values into {proposal_language}.
      - If {proposal_language} is Korean, every subject must use the exact format
        `[주식회사 98점7도] ...의 건`.
      - If {proposal_language} is Korean, every email body must start with the exact line
        `안녕하세요, 주식회사 98점7도 염정원입니다.`
      - Keep company-specific facts, CTA intent, and offer direction aligned with
        the canonical English draft and the localized proposal.
      - Keep the Onecation introduction, explicit offer sentence, and polite
        closing sentence intact in intent, even when the wording is localized.
      - Keep the email flow natural: company strength first, supporting market
        context second, explicit offer next, then one closing.
      - Do not turn competitor mentions into the headline of the email.
      - Do not duplicate the offer statement or closing sentence during localization.
      - Keep geography aligned with the verified upstream location. Do not swap
        in a different city, state, metro area, or competitor region.
      - Do not leave placeholders such as [your name], [contact name], or [city].
    - Never leave placeholders for previous-send dates. If an exact prior send
      date is unknown, rewrite naturally as "earlier", "previously", or the
      equivalent in {proposal_language} with no brackets.
    - If website access was uncertain, describe it as an audit verification
      issue instead of a hard factual no-website claim.
    - Do not mention DNS, TLS, getaddrinfo, timeout, connection refused, or
      raw browser/network errors in customer-facing copy. Rewrite them into
      neutral language about incomplete audit verification.
    - Keep Onecation and the exact company name unchanged.
    - When the target language is English, lightly polish email_outreach_task
      but keep the same structure and meaning.
    - If quality_rework_feedback is provided, treat it as mandatory internal QA notes
      and explicitly fix every listed issue before finalizing the localized email.
  expected_output: >
    Reproduce the exact company-by-company markdown structure from
    email_outreach_task:
    - the same `# Company Name` sections
    - the same `##` headings in the same order
    - the same field keys

    Only localize the customer-facing values.
  agent: email_localizer
  context:
    - email_outreach_task
    - proposal_localization_task

notion_logging_task:
  description: >
    Log one CRM row or page per company only when CRM sync is enabled and the
    field mapping is confirmed. Until then, produce a structured fallback summary
    that can be mapped later without losing context.
  expected_output: >
    First line must be exactly: TOTAL_COMPANIES: N

    Then output one markdown table with these columns:
    company_name | crm_logged | page_id_or_reason | website_bucket |
    recommended_offer_type | target_country | next_step | proposal_ready | email_ready
  agent: notion_logger
  context:
    - lead_verification_task
    - website_audit_task
    - marketing_recommendation_task
    - proposal_localization_task
    - email_localization_task
